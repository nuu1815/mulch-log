<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マルチログ | AI QR Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        :root { --blue: #005596; --red: #e60012; --white: #ffffff; --bg: #f8f9fa; }
        body { background: var(--bg); font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 50px; overflow-x: hidden; }
        
        /* トリコロール・ヘッダー */
        header { background: var(--blue); color: white; padding: 15px; text-align: center; border-bottom: 5px solid var(--red); position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        /* 可愛いトリコロールアイコン（CSSで作成） */
        .app-icon { width: 50px; height: 50px; margin: 0 auto 10px; background: white; border-radius: 12px; display: flex; overflow: hidden; border: 2px solid #ddd; }
        .icon-part { flex: 1; height: 100%; }
        .icon-blue { background: var(--blue); }
        .icon-white { background: white; }
        .icon-red { background: var(--red); }

        main { max-width: 600px; margin: 0 auto; padding: 15px; }

        /* QRカメラエリア */
        #camera-container { width: 100%; aspect-ratio: 1; background: #000; border-radius: 20px; overflow: hidden; position: relative; border: 4px solid var(--blue); margin-bottom: 15px; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        #qr-shutter { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 2px solid var(--red); box-sizing: border-box; opacity: 0.3; animation: scan 2s infinite; }
        @keyframes scan { 0% { top: -100%; } 100% { top: 100%; } }

        /* AI Tips パネル */
        #ai-panel { background: white; border-radius: 15px; padding: 20px; border-left: 8px solid var(--red); box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: none; margin-bottom: 20px; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .tips-title { color: var(--blue); font-weight: bold; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .tips-content { font-size: 0.95rem; line-height: 1.5; color: #444; }

        /* ボタン類 */
        .btn { background: var(--blue); color: white; border: none; padding: 12px 20px; border-radius: 25px; font-weight: bold; width: 100%; margin-top: 10px; cursor: pointer; }
        .btn-red { background: var(--red); }
        
        /* ログリスト */
        .log-card { background: white; border-radius: 12px; padding: 15px; margin-top: 15px; border-bottom: 3px solid var(--blue); display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<header>
    <div class="app-icon">
        <div class="icon-part icon-blue"></div>
        <div class="icon-part icon-white"></div>
        <div class="icon-part icon-red"></div>
    </div>
    <h1 style="margin:0; font-size:1.2rem; letter-spacing:2px;">マルチログ</h1>
</header>

<main>
    <div id="camera-container">
        <video id="video" autoplay playsinline></video>
        <div id="qr-shutter"></div>
        <canvas id="canvas" style="display:none;"></canvas>
    </div>

    <div id="ai-panel">
        <div class="tips-title">💡 AI執事の先読みTips</div>
        <div id="tips-text" class="tips-content">読み取り中...</div>
        <button id="open-link" class="btn">このサイトを開く</button>
        <button onclick="saveQR()" class="btn btn-red">このTipsを記録する</button>
    </div>

    <div id="log-list">
        <h3 style="color:var(--blue); border-bottom:2px solid var(--blue);">最近の知恵袋ログ</h3>
        <div id="feed"></div>
    </div>
</main>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const aiPanel = document.getElementById('ai-panel');
    const tipsText = document.getElementById('tips-text');
    let lastUrl = "";

    // カメラ起動
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(stream => {
        video.srcObject = stream;
        requestAnimationFrame(tick);
    });

    function tick() {
        if (video.readyState === video.HAVE_ENOUGH_DATA) {
            canvas.height = video.videoHeight;
            canvas.width = video.videoWidth;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const code = jsQR(imageData.data, imageData.width, imageData.height);

            if (code && code.data !== lastUrl) {
                lastUrl = code.data;
                handleQRCode(code.data);
            }
        }
        requestAnimationFrame(tick);
    }

    // AI Tipsを生成する魔法
    function handleQRCode(url) {
        aiPanel.style.display = 'block';
        let tip = "お嬢様、このQRコードの先には未知の扉が待っておりますわ。";

        // URLの中身をAIっぽく判別
        if (url.includes("wikipedia")) tip = "ウィキペディアですわね！世界の叡智が詰まっておりますが、長居して時間を忘れないようお気をつけあそばせ。";
        else if (url.includes("google")) tip = "検索の門ですわ。ここからお嬢様の知的好奇心が爆発いたしますのね。";
        else if (url.includes("instagram") || url.includes("twitter") || url.includes("x.com")) tip = "SNSの海ですわ。お嬢様の『マルチログ』の宣伝チャンスかもしれませんわよ！";
        else if (url.includes(".jp")) tip = "日本のサイトですわね。安心感がありますが、お嬢様の鋭い感性で中身を見極めてくださいませ。";
        else if (url.includes("github")) tip = "開発者の聖地ですわ！お嬢様のライバル、あるいは仲間たちの知恵が眠っております。";
        else tip = "このURL（" + new URL(url).hostname + "）は珍しい場所ですわ。AIの予測では、新しい発見がある確率85%ですわよ！";

        tipsText.innerText = tip;
        document.getElementById('open-link').onclick = () => window.open(url, '_blank');
        
        // スマホのバイブレーションでお知らせ（対応機種のみ）
        if (navigator.vibrate) navigator.vibrate(200);
    }

    function saveQR() {
        const logs = JSON.parse(localStorage.getItem('mulch_qr_logs')) || [];
        logs.unshift({ title: lastUrl, tip: tipsText.innerText, date: new Date().toLocaleString() });
        localStorage.setItem('mulch_qr_logs', JSON.stringify(logs.slice(0, 20)));
        renderLogs();
        alert("アーカイブいたしましたわ！");
    }

    function renderLogs() {
        const logs = JSON.parse(localStorage.getItem('mulch_qr_logs')) || [];
        document.getElementById('feed').innerHTML = logs.map(l => `
            <div class="log-card">
                <div style="font-size:0.8rem;">
                    <strong>${l.date}</strong><br>
                    ${l.tip}
                </div>
            </div>
        `).join('');
    }

    renderLogs();
</script>
</body>
</html>
