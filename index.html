<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIV-LOG | Universal Archive</title>
    <style>
        :root {
            --bg: #000; --card: #111; --text: #fff; --accent: #0044ff; --border: #222;
        }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding-bottom: 50px; }
        header { padding: 20px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 100; }
        .main-btn { background: var(--accent); color: #fff; border: none; padding: 15px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* フィルタボタン */
        #filter-bar { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; margin-bottom: 10px; }
        .filter-tag { background: #222; padding: 5px 12px; border-radius: 15px; font-size: 0.8rem; cursor: pointer; white-space: nowrap; border: 1px solid var(--border); }
        .filter-tag.active { background: var(--accent); border-color: var(--accent); }

        main { max-width: 800px; margin: 0 auto; padding: 0 20px; }
        .form-panel { background: var(--card); padding: 20px; border: 1px solid var(--accent); border-radius: 8px; margin-bottom: 30px; display: none; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.7rem; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        input, textarea, select { width: 100%; padding: 10px; background: #000; border: 1px solid var(--border); color: #fff; box-sizing: border-box; }

        /* カードデザイン */
        .log-card { background: var(--card); border-bottom: 1px solid var(--border); padding: 20px 0; display: flex; gap: 20px; position: relative; }
        .log-img { width: 120px; height: 120px; object-fit: cover; background: #222; border-radius: 4px; }
        .log-content { flex: 1; }
        .log-category { font-size: 0.6rem; background: var(--accent); padding: 2px 6px; border-radius: 3px; vertical-align: middle; margin-right: 8px; }
        .log-title { font-size: 1.1rem; font-weight: bold; margin: 0; }
        .log-meta { font-size: 0.8rem; color: #666; margin: 5px 0; }
        .log-text { font-size: 0.9rem; color: #ccc; white-space: pre-wrap; margin-top: 8px; }
        
        .actions { position: absolute; top: 20px; right: 0; }
        .btn-sm { background: none; border: 1px solid var(--border); color: #444; font-size: 0.6rem; padding: 3px 7px; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h1 style="margin:0; font-size:1.2rem; letter-spacing:2px;">UNIV-LOG</h1>
        <div id="btn-lang" onclick="toggleLang()" style="font-size:0.7rem; cursor:pointer; color:#888;">EN/JP</div>
    </div>
    <button class="main-btn" onclick="toggleForm()">+ 記録を追加 / ADD LOG</button>
    <div id="filter-bar"></div>
</header>

<main>
    <section id="form-panel" class="form-panel">
        <input type="hidden" id="edit-id">
        <div class="form-group"><label>Category (Movie, Plamo, Shop, etc...)</label><input type="text" id="category" placeholder="ジャンル入力"></div>
        <div class="form-group"><label>Title</label><input type="text" id="title"></div>
        <div class="form-group"><label>Date / Subtitle</label><input type="text" id="date"></div>
        <div class="form-group"><label>Image URL</label><input type="text" id="image"></div>
        <div class="form-group"><label>Rating (0-5)</label><input type="number" id="rating" min="0" max="5" value="0"></div>
        <div class="form-group"><label>Description</label><textarea id="desc" rows="5"></textarea></div>
        <button onclick="saveLog()" class="main-btn">保存 / SAVE ARCHIVE</button>
    </section>

    <div id="log-feed"></div>
</main>

<script>
    let logs = JSON.parse(localStorage.getItem('univ_logs')) || [];
    let currentFilter = 'ALL';

    function toggleForm() {
        const p = document.getElementById('form-panel');
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
        if(p.style.display === 'none') {
            document.getElementById('edit-id').value = '';
            document.querySelectorAll('input, textarea').forEach(e => e.value = '');
            document.getElementById('rating').value = 0;
        }
    }

    function saveLog() {
        const id = document.getElementById('edit-id').value;
        const data = {
            id: id ? parseInt(id) : Date.now(),
            cat: document.getElementById('category').value || 'ETC',
            title: document.getElementById('title').value || 'No Title',
            date: document.getElementById('date').value,
            img: document.getElementById('image').value,
            rate: parseInt(document.getElementById('rating').value),
            desc: document.getElementById('desc').value
        };

        if(id) logs = logs.map(l => l.id === data.id ? data : l);
        else logs.unshift(data);

        localStorage.setItem('univ_logs', JSON.stringify(logs));
        toggleForm();
        render();
    }

    function deleteLog(id) {
        if(confirm('Delete?')) {
            logs = logs.filter(l => l.id !== id);
            localStorage.setItem('univ_logs', JSON.stringify(logs));
            render();
        }
    }

    function editLog(id) {
        const l = logs.find(x => x.id === id);
        document.getElementById('edit-id').value = l.id;
        document.getElementById('category').value = l.cat;
        document.getElementById('title').value = l.title;
        document.getElementById('date').value = l.date;
        document.getElementById('image').value = l.img;
        document.getElementById('rating').value = l.rate;
        document.getElementById('desc').value = l.desc;
        document.getElementById('form-panel').style.display = 'block';
        window.scrollTo(0,0);
    }

    function setFilter(cat) {
        currentFilter = cat;
        render();
    }

    function render() {
        const cats = ['ALL', ...new Set(logs.map(l => l.cat))];
        document.getElementById('filter-bar').innerHTML = cats.map(c => 
            `<div class="filter-tag ${currentFilter === c ? 'active' : ''}" onclick="setFilter('${c}')">${c}</div>`
        ).join('');

        const filtered = currentFilter === 'ALL' ? logs : logs.filter(l => l.cat === currentFilter);
        document.getElementById('log-feed').innerHTML = filtered.map(l => `
            <div class="log-card">
                <img src="${l.img || 'https://via.placeholder.com/120'}" class="log-img">
                <div class="log-content">
                    <p class="log-meta"><span class="log-category">${l.cat}</span> ${l.date || ''}</p>
                    <h3 class="log-title">${l.title}</h3>
                    <div style="color:var(--accent); font-size:0.7rem; margin:3px 0;">${l.rate > 0 ? '★'.repeat(l.rate) : ''}</div>
                    <div class="log-text">${l.desc}</div>
                </div>
                <div class="actions">
                    <button class="btn-sm" onclick="editLog(${l.id})">EDIT</button>
                    <button class="btn-sm" onclick="deleteLog(${l.id})">DEL</button>
                </div>
            </div>
        `).join('');
    }

    render();
</script>
</body>
</html>
